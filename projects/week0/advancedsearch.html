<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Advanced Search</title>
</head>
<body>


    <nav>
        <div class="links"><a href="index.html">Back to Search</a></div>

    </nav>

    <section>
    <form action="https://www.google.com/search">

        <div class="container">
        <label for="all">All these words:         </label>
        <input class="searchbox" id="all" type="text" name="as_q">
        </div>

        <div class="container"><label for="exact">This exact word or phrase:        </label>
        <input class="searchbox" id="exact" type="text" name="as_epq"> 
        </div>

        <div class="container">
        <label for="none">None of these words:        </label>
        <input class="searchbox" id="none" type="text" name="as_eq">
        </div>


        <input id="advsearchbutton" type="submit" value="Advanced Search">
        
    </form>
    </section>
</body>
</html>
